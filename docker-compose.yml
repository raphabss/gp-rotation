services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gp-rotation-app
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-spingaming-2024-change-me}
      - GRAPH_ENABLED=${GRAPH_ENABLED:-false}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID:-}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      - GRAPH_SITE_ID=${GRAPH_SITE_ID:-}
      - GRAPH_FILE_PATH=${GRAPH_FILE_PATH:-}
      - GRAPH_SHEET_NAME=${GRAPH_SHEET_NAME:-Rotação}
    volumes:
      - ./data:/app/data
      - ./frontend-tv:/app/frontend-tv:ro
      - ./frontend-admin:/app/frontend-admin:ro
    networks:
      - gp-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: gp-rotation-nginx
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - gp-net

networks:
  gp-net:
    driver: bridge
