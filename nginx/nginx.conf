worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on; keepalive_timeout 65;
    gzip on; gzip_types text/plain text/css application/json application/javascript text/html;
    upstream app_backend { server app:3000; keepalive 16; }
    server {
        listen 80; server_name _;
        location /ws {
            proxy_pass http://app_backend; proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
            proxy_set_header Host $host; proxy_read_timeout 86400s; proxy_send_timeout 86400s;
        }
        location / {
            proxy_pass http://app_backend; proxy_http_version 1.1;
            proxy_set_header Connection ""; proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
