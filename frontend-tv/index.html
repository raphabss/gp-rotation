<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotação de GPs — Spin Gaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a0f; --panel:#0d131e; --panel-2:#111a28; --line:#1d2838;
  --text:#eef2f7; --text-dim:#8a9bb0; --text-mut:#46566b;
  --gold:#d4af37; --gold-soft:#e8cc7a;
  --spin:#4a3cdb; --spin-deep:#2a1f8a; --spin-soft:#7b6cf5; --spin-bar:#1a1452;
  --cda:#1faa59; --blaze:#e23744; --sports:#f06a25; --shufflers:#7c5cff; --vip:#d4af37; --goal:#e8b923;
  --mono:'JetBrains Mono',monospace; --disp:'Rajdhani',sans-serif; --body:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
.screen{display:grid;grid-template-rows:72px 1fr 40px;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,#0a0a18,var(--spin-bar) 50%,#0a0a18);position:relative}
.hdr::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,var(--spin-soft),transparent);opacity:.7}
.brand{display:flex;align-items:center;gap:14px}
.logo-spin-img{height:38px;width:auto;display:block}
.brand-logos{display:flex;align-items:center;gap:8px;margin-left:auto}
.brand-logos img{height:30px;width:auto;display:block;box-shadow:0 1px 4px rgba(0,0,0,.35);border-radius:7px}
.logo-spin{display:flex;flex-direction:column;line-height:.92}
.logo-spin .sp{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:.02em;color:#fff;text-transform:uppercase}
.logo-spin .gm{font-size:10px;font-weight:600;letter-spacing:.42em;color:var(--spin-soft);text-transform:uppercase;margin-top:2px}
.brand-divider{width:1px;height:34px;background:var(--line);margin:0 4px}
.brand-name{font-family:var(--disp);font-size:23px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.brand-sub{font-size:10px;letter-spacing:.22em;color:var(--spin-soft);text-transform:uppercase;margin-top:1px}
.hdr-center{display:flex;align-items:center;gap:16px}
.shift-pill{display:flex;align-items:center;gap:9px;background:rgba(74,60,219,.14);border:1px solid rgba(123,108,245,.45);border-radius:30px;padding:6px 18px}
.shift-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 2s infinite}
.fallback-badge{display:none;align-items:center;gap:6px;margin-left:10px;padding:5px 13px;border-radius:30px;background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.5);color:var(--gold-soft);font-size:13px;font-weight:600;white-space:nowrap}
.fallback-badge.show{display:inline-flex}
.shift-txt{font-family:var(--disp);font-size:18px;font-weight:600;letter-spacing:.05em;color:#cfc6ff;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:18px}
.clock{font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:.02em;line-height:1}
.clock-d{font-size:11px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:3px;text-align:right}
.toggle{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toggle button{background:transparent;border:none;color:var(--text-dim);font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:.15s}
.toggle button.active{background:var(--spin);color:#fff}
.body{overflow:hidden;min-height:0;padding:16px 20px;position:relative;display:flex;flex-direction:column;justify-content:flex-start}
#fit{display:flex;flex-direction:column;gap:14px;transform-origin:top left}
.brand-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column}
.brand-block>.matrix{flex:1 1 auto}
.brand-bar{display:flex;align-items:center;gap:10px;padding:7px 16px;border-left:4px solid var(--brand,#888);background:var(--panel-2)}
.brand-bar .tag{font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand,#fff)}
.brand-bar .count{font-size:11px;color:var(--text-dim);letter-spacing:.04em}
.matrix{width:100%;border-collapse:collapse;table-layout:fixed}
.matrix th,.matrix td{padding:0;text-align:center;font-size:13px}
.matrix thead th{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text-dim);padding:5px 2px;border-bottom:1px solid var(--line)}
.matrix thead th.gp-col{text-align:left;padding-left:16px;width:200px}
.matrix tbody td.gp-col{text-align:left;padding:5px 16px}
.gp-nick{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:.02em;line-height:1.05}
.gp-name{font-size:10px;color:var(--text-dim);letter-spacing:.02em}
.cell{font-family:var(--mono);font-weight:700;font-size:13px;padding:4px 2px;border-radius:4px;margin:2px 1px;display:block}
.cell.table{color:#fff}
.cell.break{color:#6b7a8d;background:rgba(51,65,79,.25)}
.cell.off{color:#3a4658}
.cell.tables{font-size:.82em;letter-spacing:-.02em;line-height:1.05}
.cell.todo{color:#e6a23c;border:1px dashed rgba(230,162,60,.7);background:rgba(230,162,60,.08);font-size:.78em;letter-spacing:.04em}
.cell.all{color:var(--gold-soft);background:rgba(212,175,55,.12)}
.cell.empty{color:#2a3340}
.col-now{background:rgba(31,170,89,.13);box-shadow:inset 2px 0 0 #1faa59,inset -2px 0 0 #1faa59}
.matrix thead th.col-now{color:#7fe0a5;background:rgba(31,170,89,.20)}
.col-next{background:rgba(212,175,55,.10);box-shadow:inset 2px 0 0 var(--gold),inset -2px 0 0 var(--gold)}
.matrix thead th.col-next{color:var(--gold-soft);background:rgba(212,175,55,.16)}
.nn-wrap{display:flex;flex-direction:column;gap:14px;flex-shrink:0}
.nn-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-shrink:0}
.nn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:14px}
.nn-card{background:var(--panel-2);border:1px solid var(--line);border-left:4px solid var(--brand,#888);border-radius:8px;padding:12px 14px}
.nn-card.is-break{opacity:.5}
.nn-head{margin-bottom:10px}
.nn-nick{font-family:var(--disp);font-size:22px;font-weight:700;letter-spacing:.02em;line-height:1}
.nn-name{font-size:10px;color:var(--text-dim);margin-top:2px}
.nn-loc{display:flex;align-items:center;gap:12px}
.nn-now,.nn-next{display:flex;flex-direction:column}
.nn-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:3px}
.nn-val{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
.nn-now .nn-val{color:var(--brand,#fff)}
.nn-next .nn-val{font-size:18px;color:var(--text-dim)}
.nn-arrow{color:var(--text-mut);font-size:16px;align-self:flex-end;padding-bottom:3px}
.nn-val.brk{color:#6b7a8d;font-size:18px}
.nn-now-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.nn-now-big{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1;padding:6px 8px;border-radius:6px;text-align:center}
.nn-steps-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mut);display:block;margin-bottom:5px}
.nn-steps-row{display:flex;gap:6px}
.nn-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.nn-step-t{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.nn-step-v{font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 2px;border-radius:5px;width:100%;text-align:center;background:var(--panel);color:var(--text-dim)}
.nn-step-end{font-size:11px;color:var(--text-mut);font-style:italic}
.ftr{display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-top:1px solid var(--line);background:rgba(7,10,15,.85);font-size:11px;color:var(--text-mut);letter-spacing:.05em}
.ftr .conn{display:flex;align-items:center;gap:7px}
.conn .ci{width:6px;height:6px;border-radius:50%;background:var(--text-mut)}
.conn .ci.on{background:var(--cda);box-shadow:0 0 5px var(--cda)}
.conn .ci.off{background:var(--blaze);animation:blink 1s step-end infinite}
.offline{display:none;position:fixed;top:0;left:0;right:0;padding:8px;background:rgba(226,55,68,.92);color:#fff;text-align:center;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;z-index:100}
.offline.show{display:block}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-mut)}
.empty-state .big{font-family:var(--disp);font-size:24px;letter-spacing:.05em}
.body::-webkit-scrollbar{width:8px}.body::-webkit-scrollbar-track{background:transparent}.body::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>

<script>
// Mapa de cores por (marca + mesa), fiel aos prints da planilha.
// O texto é calculado automaticamente conforme a luminância do fundo.

  var TABLE_COLORS = {
    CDA: {
      '6130':'#f5e7a3', '6131':'#f4c7c7', '6132':'#a9d8a0', '6133':'#e8706c',
      '6134':'#f2f2f2', '6150':'#d8b24e', 'B':'#6f6f6f'
    },
    BLAZE: {
      '6140':'#3b4047', '6141':'#7d1f1f', '6142':'#9a9a9a', '6143':'#ff2d2d',
      '6144':'#efefef', '6150':'#d8b24e', 'B':'#b53636'
    },
    Shufflers: {
      'ALL':'#e8b8e0', 'B':'#e3998a'
    }
  };
  var DEFAULT = { table:'#2a3340', B:'#33414f', ALL:'#e8b8e0', X:'#1a212c' };

  // Luminância relativa -> decide texto claro/escuro
  function textColor(hex){
    var c = hex.replace('#',''); if(c.length===3){c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];}
    var r=parseInt(c.substr(0,2),16)/255, g=parseInt(c.substr(2,2),16)/255, b=parseInt(c.substr(4,2),16)/255;
    var f=function(v){return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);};
    var L=0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
    return L>0.45 ? '#15181d' : '#f5f7fa';   // fundo claro->texto escuro; escuro->claro
  }

  // Retorna {bg, fg} para uma célula de uma marca
  function cellColor(brand, cell){
    if(!cell) return null;
    var map = TABLE_COLORS[brand] || {};
    var bg = null;
    if(cell.type==='table') bg = map[cell.table] || DEFAULT.table;
    else if(cell.type==='tables') bg = map[cell.tables[0]] || DEFAULT.table;
    else if(cell.type==='break') bg = map['B'] || DEFAULT.B;
    else if(cell.type==='all') bg = map['ALL'] || DEFAULT.ALL;
    else if(cell.type==='todo') return { bg:'transparent', fg:'#e6a23c' };
    else if(cell.type==='off') return { bg:'transparent', fg:'#3a4658' };
    else return null;
    return { bg: bg, fg: textColor(bg) };
  }

var _brandLogoShown = {};
function brandLogosHtml(brand){
  if(_brandLogoShown[brand]) return '';
  var L=BRAND_LOGOS[brand]; if(!L) return '';
  _brandLogoShown[brand]=true;
  return '<span class="brand-logos">'+L.map(function(src){return '<img src="'+src+'" alt="'+brand+'">';}).join('')+'</span>';
}

const API=location.origin+'/api';
var SIM_SHIFT=new URLSearchParams(location.search).get('shift');
function rotaUrl(){return API+'/rotation'+(SIM_SHIFT?('?shift='+encodeURIComponent(SIM_SHIFT)):'');}
const WS=(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws';
const BRAND_COLOR={CDA:'var(--cda)',BLAZE:'var(--blaze)','Sports Club':'var(--sports)',Shufflers:'var(--shufflers)',VIP:'var(--vip)',Goal:'var(--goal)'};
let state=null, ws=null, view=new URLSearchParams(location.search).get('view')||'matrix', wsOK=false;
const DAYS=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MON=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
function tick(){const n=new Date();
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clockD').textContent=DAYS[n.getDay()]+', '+n.getDate()+' '+MON[n.getMonth()];
  if(state)render();}
setInterval(tick,15000);
function activeIdx(slots,now){now=now||new Date();const m=now.getHours()*60+now.getMinutes();let a=-1;
  for(let k=0;k<slots.length;k++){const t=String(slots[k]).match(/^(\d{1,2}):(\d{2})$/);if(!t)continue;
    const sm=(+t[1])*60+(+t[2]);if(sm<=m)a=k;else break;}return a;}
function cellTxt(c){if(!c)return'';if(c.type==='table')return c.table;if(c.type==='tables')return c.tables.join(' / ');if(c.type==='break')return'B';if(c.type==='off')return'X';if(c.type==='all')return'ALL';if(c.type==='todo')return'DEFINIR';if(c.type==='provider')return c.value;return c.value||'';}
function cellClass(c){if(!c)return'empty';return c.type==='table'?'table':c.type;}
/* tables/todo usam as classes 'tables'/'todo' direto do c.type */
function setView(v){view=v;
  document.getElementById('btnMatrix').classList.toggle('active',v==='matrix');
  document.getElementById('btnNowNext').classList.toggle('active',v==='nownext');render();}
function render(){
  if(!state)return;
  document.getElementById('shiftTxt').textContent=((state.shift||'')+(state.date?' · '+state.date:''))||'Sem dados';
  document.getElementById('srcTxt').textContent='Fonte: '+(state.source||'—');
  if(state.lastUpdate){const d=new Date(state.lastUpdate);document.getElementById('updTxt').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
  var fitEl=document.getElementById('fit');
  if(!state.blocks||state.blocks.length===0){stopAutoScroll();fitEl.style.transform='none';fitEl.style.width='100%';fitEl.style.height='';fitEl.innerHTML='<div class="empty-state"><div class="big">Aguardando rotação</div><div>Nenhum dado carregado da planilha ainda.</div></div>';return;}
  fitEl.innerHTML=view==='matrix'?renderMatrix():renderNowNext();
  applyLayout();}
function renderMatrix(){
  _brandLogoShown={};
  return state.blocks.map(function(b){
    var color=BRAND_COLOR[b.brand]||'#888';var now=activeIdx(b.slots);
    var head='<th class="gp-col">'+b.brand+'</th>'+b.slots.map(function(s,k){return '<th class="'+(k===now?'col-now':(k===now+1?'col-next':''))+'">'+s+'</th>';}).join('');
    var rows=b.presenters.map(function(p){
      var tds=p.cells.map(function(c,k){var cc=window.GP_COLORS.cellColor(b.brand,c);var st=cc?('background:'+cc.bg+';color:'+cc.fg):'';return '<td class="'+(k===now?'col-now':(k===now+1?'col-next':''))+'"><span class="cell '+cellClass(c)+'" style="'+st+'">'+cellTxt(c)+'</span></td>';}).join('');
      return '<tr><td class="gp-col"><div class="gp-nick">'+(p.nick||p.name)+'</div>'+(p.nick&&p.name?'<div class="gp-name">'+p.name+'</div>':'')+'</td>'+tds+'</tr>';}).join('');
    return '<div class="brand-block" style="--brand:'+color+'"><div class="brand-bar"><span class="tag">'+b.brand+'</span><span class="count">'+b.presenters.length+' GPs · '+b.slots.length+' turnos</span>'+brandLogosHtml(b.brand)+'</div><table class="matrix"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
  }).join('');}
function fitToScreen(){
  var body=document.getElementById('body'); var fit=document.getElementById('fit');
  if(!body||!fit) return;
  fit.style.width='100%'; fit.style.transform='none'; fit.style.height='';
  // limpa crescimento anterior dos blocos
  var allb=fit.querySelectorAll('.brand-block');
  for(var j=0;j<allb.length;j++){ allb[j].style.flexGrow=''; }
  var cs=getComputedStyle(body);
  var padV=(parseFloat(cs.paddingTop)||0)+(parseFloat(cs.paddingBottom)||0);
  var avail=(body.clientHeight - padV) - 4;
  var natural=fit.scrollHeight;
  if(natural<=avail){
    // cabe: PREENCHE a altura distribuindo o espaço entre os blocos/linhas.
    // Cada bloco cresce proporcional ao nº de linhas -> altura de linha uniforme.
    body.style.justifyContent='flex-start';
    fit.style.transform='none'; fit.style.width='100%';
    fit.style.height=avail+'px';
    var blocks=fit.querySelectorAll('.brand-block');
    for(var i=0;i<blocks.length;i++){
      var n=blocks[i].querySelectorAll('tbody tr').length||1;
      blocks[i].style.flexGrow=String(n);
    }
    return;
  }
  // alto demais: ancora no topo e encolhe pra caber (2 passadas p/ convergir)
  fit.style.height='';
  body.style.justifyContent='flex-start';
  for(var k=0;k<2;k++){
    avail=(body.clientHeight - padV) - 4;
    natural=fit.scrollHeight;
    if(natural<=avail){ fit.style.width='100%'; fit.style.transform='none'; return; }
    var scale=Math.max(avail/natural, 0.4);
    fit.style.width=(100/scale)+'%';
    fit.style.transform='scale('+scale+')';
  }
}
var _fitRAF=null;
// Decide o layout por aba: Matriz encolhe pra caber; Agora/Próximo rola sozinha.
// IMPORTANTE: não reinicia o auto-scroll a cada render (o polling/WS recria o
// conteúdo a cada 20s); preserva a posição para conseguir percorrer listas longas.
function applyLayout(){
  var fit=document.getElementById('fit');
  if(!fit) return;
  if(view==='matrix'){
    stopAutoScroll();
    fitToScreen();
  } else {
    document.getElementById('body').style.justifyContent='flex-start';
    fit.style.width='100%'; fit.style.height='';
    if(!_scroll.raf){ startAutoScroll(); }  // só inicia se ainda não estiver rolando
  }
}
// ── Auto-scroll da aba Agora/Próximo (translateY, sem barra; laço com pausas) ──
// Velocidade baseada em TEMPO real (px/seg), não em frames — assim a rolagem
// é consistente mesmo em navegadores de TV/thin client que rodam abaixo de 60fps.
var _scroll={raf:null,pos:0,dir:1,pauseUntil:0,last:0};
function stopAutoScroll(){ if(_scroll.raf){cancelAnimationFrame(_scroll.raf);_scroll.raf=null;} _scroll={raf:null,pos:0,dir:1,pauseUntil:0,last:0}; }
function startAutoScroll(){
  var body=document.getElementById('body'), fit=document.getElementById('fit');
  if(!body||!fit) return;
  var cs=getComputedStyle(body);
  var padV=(parseFloat(cs.paddingTop)||0)+(parseFloat(cs.paddingBottom)||0);
  var PX_PER_SEC=70;     // velocidade de rolagem (px/seg) — leitura confortável
  var PAUSE_MS=2500;     // pausa nas pontas (topo e fim)
  _scroll.last=0;
  function step(ts){
    if(!_scroll.last) _scroll.last=ts;
    var dt=(ts-_scroll.last)/1000; _scroll.last=ts;
    if(dt>0.25) dt=0.25;  // evita salto se a aba ficou suspensa
    var avail=body.clientHeight - padV;
    var over=fit.scrollHeight - avail;
    if(over<=2){ fit.style.transform='none'; _scroll.pos=0; _scroll.raf=requestAnimationFrame(step); return; }
    if(ts>=_scroll.pauseUntil){
      _scroll.pos += _scroll.dir*PX_PER_SEC*dt;
      if(_scroll.pos>=over){ _scroll.pos=over; _scroll.dir=-1; _scroll.pauseUntil=ts+PAUSE_MS; }
      else if(_scroll.pos<=0){ _scroll.pos=0; _scroll.dir=1; _scroll.pauseUntil=ts+PAUSE_MS; }
    }
    fit.style.transform='translateY('+(-_scroll.pos)+'px)';
    _scroll.raf=requestAnimationFrame(step);
  }
  _scroll.raf=requestAnimationFrame(step);
}
function scheduleFit(){ if(_fitRAF) cancelAnimationFrame(_fitRAF); _fitRAF=requestAnimationFrame(function(){ applyLayout(); }); }
window.addEventListener('resize', scheduleFit);
window.addEventListener('orientationchange', function(){ setTimeout(applyLayout,150); });
window.addEventListener('load', function(){ applyLayout(); setTimeout(applyLayout,300); setTimeout(applyLayout,1500); setTimeout(applyLayout,4000); });
if(window.visualViewport){ window.visualViewport.addEventListener('resize', scheduleFit); }
// reage a mudança de DPI/zoom (devicePixelRatio) via matchMedia dinâmico
(function watchDPR(){
  if(!window.matchMedia) return;
  var mq=window.matchMedia('(resolution: '+window.devicePixelRatio+'dppx)');
  var on=function(){ applyLayout(); watchDPR(); };
  try{ mq.addEventListener('change', on, {once:true}); }catch(e){ try{ mq.addListener(on); }catch(_){} }
})();
// recálculo após imagens (logos) carregarem, que mudam a altura
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('img').forEach(function(im){ if(!im.complete) im.addEventListener('load', scheduleFit); });
});

function nnVal(c){
  if(!c) return '—';
  if(c.type==='table') return c.table;
  if(c.type==='tables') return c.tables.join('/');
  if(c.type==='all') return 'ALL';
  if(c.type==='break') return 'Pausa';
  if(c.type==='off') return 'Folga';
  if(c.type==='todo') return 'DEFINIR';
  return '—';
}

function renderNowNext(){
  _brandLogoShown={};
  return '<div class="nn-wrap">'+state.blocks.map(function(b){
    var color=BRAND_COLOR[b.brand]||'#888';var now=activeIdx(b.slots);var next=(now+1<b.slots.length)?now+1:-1;
    var cards=b.presenters.map(function(p){
      var cn=p.cells[now];
      var isBreak=!cn||cn.type==='break'||cn.type==='off'||cn.type==='empty';
      var cc=window.GP_COLORS.cellColor(b.brand,cn);
      // próximas 3 células após a atual
      var nexts='';
      for(var d=1; d<=3; d++){
        var idx=now+d; if(idx>=b.slots.length) break;
        var nc=p.cells[idx]; var ncc=window.GP_COLORS.cellColor(b.brand,nc);
        var stt = ncc ? ('background:'+ncc.bg+';color:'+ncc.fg) : '';
        nexts += '<div class="nn-step"><span class="nn-step-t">'+b.slots[idx]+'</span><span class="nn-step-v" style="'+stt+'">'+nnVal(nc)+'</span></div>';
      }
      var nowStyle = cc ? ('background:'+cc.bg+';color:'+cc.fg) : '';
      return '<div class="nn-card'+(isBreak?' is-break':'')+'">'+
        '<div class="nn-head"><div class="nn-nick">'+(p.nick||p.name)+'</div>'+(p.nick&&p.name?'<div class="nn-name">'+p.name+'</div>':'')+'</div>'+
        '<div class="nn-now-row"><span class="nn-lbl">Agora '+(b.slots[now]||'')+'</span><span class="nn-now-big" style="'+nowStyle+'">'+nnVal(cn)+'</span></div>'+
        '<div class="nn-steps"><span class="nn-steps-lbl">A seguir</span><div class="nn-steps-row">'+(nexts||'<span class="nn-step-end">fim do turno</span>')+'</div></div>'+
      '</div>';}).join('');
    return '<div class="nn-block" style="--brand:'+color+'"><div class="brand-bar"><span class="tag">'+b.brand+'</span><span class="count">Slot atual: '+(b.slots[now]||'fora de turno')+'</span>'+brandLogosHtml(b.brand)+'</div><div class="nn-grid">'+cards+'</div></div>';
  }).join('')+'</div>';}
function cache(s){try{localStorage.setItem('gp_rotation',JSON.stringify(s))}catch(e){}}
function loadCache(){try{var r=localStorage.getItem('gp_rotation');return r?JSON.parse(r):null}catch(e){return null}}
function conn(s){var ci=document.getElementById('ci'),t=document.getElementById('connTxt'),o=document.getElementById('offline');
  ci.className='ci '+(s==='on'?'on':'off');
  if(s==='on'){t.textContent='Online';o.classList.remove('show');wsOK=true;}
  else{t.textContent=s==='reconnecting'?'Reconectando...':'Offline';o.classList.add('show');wsOK=false;}}
function connect(){conn('reconnecting');ws=new WebSocket(WS);
  ws.onopen=function(){conn('on');};
  ws.onmessage=function(e){try{var m=JSON.parse(e.data);if(m.type==='ROTATION_UPDATE'&&!SIM_SHIFT){state=m.payload;cache(state);render();}}catch(err){}};
  ws.onclose=function(){conn('off');setTimeout(connect,3000);};
  ws.onerror=function(){ws.close();};}
var cached=loadCache();if(cached){state=cached;render();}
tick();
fetch(rotaUrl()).then(function(r){return r.json();}).then(function(s){state=s;cache(s);render();}).catch(function(){});
connect();
